<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>✉️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1510;
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --rose: #c17a8a;
      --shadow: rgba(26, 21, 16, 0.15);
    }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background: var(--ink);
      color: var(--cream);
      overflow: hidden;
    }

    /* ── PARTICLES ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 1;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
    }

    /* ── WELCOME SCREEN ── */
    #screen-welcome {
      text-align: center;
    }
    .envelope-wrap {
      margin-bottom: 3rem;
      cursor: pointer;
      position: relative;
    }
    .envelope {
      width: 120px;
      height: 80px;
      position: relative;
      margin: 0 auto;
    }
    .env-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2a2318 0%, #1a1510 100%);
      border: 1.5px solid var(--gold);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .env-body::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(201,168,76,0.05), transparent);
    }
    .env-flap {
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      width: calc(100% + 2px);
      height: 42px;
      clip-path: polygon(0 0, 50% 55%, 100% 0);
      background: linear-gradient(180deg, #1a1510 0%, #2a2318 100%);
      border-left: 1.5px solid var(--gold);
      border-right: 1.5px solid var(--gold);
      transform-origin: top center;
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .env-seal {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      z-index: 2;
      box-shadow: 0 0 12px rgba(201,168,76,0.5);
      transition: opacity 0.3s;
    }
    .env-lines {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: center;
    }
    .env-line {
      height: 1px;
      background: rgba(201,168,76,0.3);
      border-radius: 1px;
    }

    .envelope.open .env-flap {
      transform: rotateX(180deg);
    }
    .envelope.open .env-seal {
      opacity: 0;
    }

    .welcome-title {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.2;
      margin-bottom: 1rem;
      animation: fadeUp 1.2s ease both;
      animation-delay: 0.3s;
    }
    .welcome-sub {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      font-weight: 300;
      font-style: italic;
      color: var(--gold-light);
      opacity: 0.8;
      animation: fadeUp 1.2s ease both;
      animation-delay: 0.6s;
      margin-bottom: 3rem;
    }
    .tap-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: pulse 2s ease 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CODE SCREEN ── */
    #screen-code {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .code-title {
      font-size: clamp(1.6rem, 6vw, 2.5rem);
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    .code-sub {
      font-style: italic;
      color: var(--gold-light);
      opacity: 0.7;
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }
    .date-input-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .date-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid rgba(201,168,76,0.4);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      text-align: center;
      padding: 0.75rem 0;
      outline: none;
      letter-spacing: 0.15em;
      transition: border-color 0.3s;
    }
    .date-input::placeholder {
      color: rgba(245,240,232,0.25);
      font-style: italic;
    }
    .date-input:focus {
      border-bottom-color: var(--gold);
    }
    .date-input.shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .date-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.5;
      margin-top: 0.5rem;
    }
    .btn-unlock {
      margin-top: 2rem;
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 1rem 2.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-unlock::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }
    .btn-unlock:hover {
      color: var(--ink);
    }
    .btn-unlock:hover::before {
      transform: scaleX(1);
    }
    .error-msg {
      margin-top: 1.5rem;
      font-style: italic;
      color: var(--rose);
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.4s;
      min-height: 1.5rem;
    }
    .error-msg.show { opacity: 1; }

    /* ── TICKET SCREEN ── */
    #screen-ticket {
      padding: 1rem;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }
    .ticket-header {
      text-align: center;
      padding-top: 1rem;
    }
    .ticket-reveal-title {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 300;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }
    .ticket-reveal-sub {
      font-style: italic;
      color: var(--gold);
      opacity: 0.7;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }
    .pdf-container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      overflow: hidden;
      background: #111;
      flex: 1;
      min-height: 70vh;
      animation: revealTicket 0.8s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes revealTicket {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    iframe {
      width: 100%;
      height: 100%;
      min-height: 70vh;
      border: none;
      display: block;
    }
    .ticket-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding-bottom: 2rem;
    }
    .btn-action {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
    }
    .btn-action:hover {
      background: rgba(201,168,76,0.1);
    }

    /* ── CONFETTI BURST ── */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    .confetti-piece {
      position: absolute;
      width: 6px;
      height: 6px;
      opacity: 0;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── NO TICKET ── */
    .no-ticket {
      text-align: center;
      padding: 4rem 2rem;
      color: rgba(245,240,232,0.4);
      font-style: italic;
    }

    /* ── GOLD DIVIDER ── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div id="confetti"></div>

<!-- SCREEN 1: Welcome -->
<div class="screen" id="screen-welcome">
  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope" id="envelope">
      <div class="env-body">
        <div class="env-lines">
          <div class="env-line" style="width:45px"></div>
          <div class="env-line" style="width:35px"></div>
          <div class="env-line" style="width:28px"></div>
        </div>
      </div>
      <div class="env-flap"></div>
      <div class="env-seal">♥</div>
    </div>
  </div>

  <h1 class="welcome-title" id="welcomeTitle">Κάτι σε<br><em>περιμένει...</em></h1>
  <div class="divider"></div>
  <p class="welcome-sub" id="welcomeSub">άγγιξε για να ανοίξεις</p>
  <span class="tap-hint">↓ tap ↓</span>
</div>

<!-- SCREEN 2: Code Entry -->
<div class="screen hidden" id="screen-code">
  <h2 class="code-title">Ποια είναι η<br><em>ημερομηνία μας;</em></h2>
  <div class="divider"></div>
  <p class="code-sub">ξέρεις ποια...</p>

  <div class="date-input-wrap">
    <input
      type="text"
      class="date-input"
      id="codeInput"
      placeholder="π.χ. 14/02/2022"
      autocomplete="off"
      inputmode="numeric"
    >
    <p class="date-hint">ημερομηνία επετείου</p>
  </div>

  <button class="btn-unlock" id="btnUnlock">Ξεκλείδωμα</button>
  <p class="error-msg" id="errorMsg"></p>
</div>

<!-- SCREEN 3: Ticket -->
<div class="screen hidden" id="screen-ticket">
  <div class="ticket-header">
    <h2 class="ticket-reveal-title">Το εισητήριό σου 🎫</h2>
    <p class="ticket-reveal-sub">καλή διασκέδαση ♥</p>
  </div>
  <div class="pdf-container" id="pdfContainer">
    <iframe id="pdfFrame" src="" title="Ticket"></iframe>
  </div>
  <div class="ticket-actions">
    <a id="btnDownload" href="/api/ticket" download="ticket.pdf" class="btn-action">↓ Λήψη</a>
    <a id="btnOpen" href="/api/ticket" target="_blank" class="btn-action">↗ Άνοιγμα</a>
  </div>
</div>

<script>
// ── PARTICLES ──
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = [];
  for (let i = 0; i < 35; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.4 + 0.1,
      opacity: Math.random() * 0.5 + 0.1,
      drift: (Math.random() - 0.5) * 0.3
    });
  }
  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${p.opacity})`;
      ctx.fill();
      p.y -= p.speed;
      p.x += p.drift;
      if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
})();

// ── STATE ──
let currentScreen = 'welcome';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('screen-' + id).classList.remove('hidden');
  currentScreen = id;
}

// ── LOAD INFO ──
async function loadInfo() {
  const res = await fetch('/api/info');
  const data = await res.json();
  document.getElementById('welcomeTitle').innerHTML =
    data.welcomeMessage.replace(/\n/g, '<br>') || 'Κάτι σε<br><em>περιμένει...</em>';
  if (data.unlocked) {
    showTicket();
  }
}

// ── ENVELOPE CLICK ──
document.getElementById('envelopeWrap').addEventListener('click', () => {
  const env = document.getElementById('envelope');
  env.classList.add('open');
  setTimeout(() => showScreen('code'), 900);
});

// ── VERIFY CODE ──
document.getElementById('btnUnlock').addEventListener('click', verifyCode);
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') verifyCode();
});

async function verifyCode() {
  const input = document.getElementById('codeInput');
  const code = input.value.trim();
  if (!code) return;

  const btn = document.getElementById('btnUnlock');
  btn.textContent = '...';
  btn.disabled = true;

  const res = await fetch('/api/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code })
  });
  const data = await res.json();

  btn.textContent = 'Ξεκλείδωμα';
  btn.disabled = false;

  if (data.success) {
    showConfetti();
    setTimeout(showTicket, 600);
  } else {
    const err = document.getElementById('errorMsg');
    err.textContent = data.message;
    err.classList.add('show');
    input.classList.add('shake');
    setTimeout(() => {
      input.classList.remove('shake');
      err.classList.remove('show');
    }, 2000);
  }
}

function showTicket() {
  showScreen('ticket');
  document.getElementById('pdfFrame').src = '/api/ticket';
}

// ── CONFETTI ──
function showConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#c9a84c', '#e8d5a3', '#c17a8a', '#f5f0e8', '#a8c5a0'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    piece.style.width = (Math.random() * 6 + 4) + 'px';
    piece.style.height = (Math.random() * 6 + 4) + 'px';
    piece.style.animation = `confettiFall ${Math.random() * 1.5 + 1}s ease ${Math.random() * 0.5}s forwards`;
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 3000);
}

loadInfo();
</script>
</body>
</html>
