<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Ticket App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0d0a;
      --surface: #1a1510;
      --border: rgba(201,168,76,0.2);
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --cream: #f5f0e8;
      --muted: rgba(245,240,232,0.45);
      --success: #7aaa8c;
      --error: #c17a8a;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── LOGIN ── */
    #login-wrap {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      margin-bottom: 0.3rem;
    }
    .login-sub {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1rem auto 2rem;
    }

    /* ── FORM ELEMENTS ── */
    .field {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
      border-color: var(--gold);
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }
    .btn:hover {
      background: var(--gold);
      color: var(--bg);
    }
    .btn.danger {
      border-color: var(--error);
      color: var(--error);
    }
    .btn.danger:hover {
      background: var(--error);
      color: white;
    }
    .btn.small {
      width: auto;
      padding: 0.6rem 1.2rem;
      font-size: 0.6rem;
    }

    /* ── ADMIN PANEL ── */
    #admin-wrap {
      width: 100%;
      max-width: 580px;
      display: none;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .admin-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
    }
    .admin-title span { color: var(--gold); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    /* Drop zone */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 3px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      margin-bottom: 1rem;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }
    .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
    .drop-text {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .drop-text strong { color: var(--cream); }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      margin-bottom: 1rem;
    }
    .status-badge.active { background: rgba(122,170,140,0.15); color: var(--success); border: 1px solid rgba(122,170,140,0.3); }
    .status-badge.inactive { background: rgba(193,122,138,0.1); color: var(--error); border: 1px solid rgba(193,122,138,0.2); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--cream);
      font-size: 0.75rem;
      padding: 0.8rem 1.5rem;
      border-radius: 2px;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      z-index: 999;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--error); color: var(--error); }

    .selected-file {
      font-size: 0.75rem;
      color: var(--gold);
      margin-top: 0.5rem;
      font-style: italic;
    }

    .logout-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--error); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <h1 class="login-title">Admin</h1>
  <p class="login-sub">Ticket App — Διαχείριση</p>
  <div class="divider"></div>
  <div class="field">
    <label>Κωδικός πρόσβασης</label>
    <input type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btnLogin">Είσοδος</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin-wrap">
  <div class="admin-header">
    <h2 class="admin-title">Admin <span>Panel</span></h2>
    <button class="logout-btn" id="btnLogout">↩ Έξοδος</button>
  </div>

  <!-- Current status -->
  <div class="card">
    <p class="card-title">Κατάσταση εισητηρίου</p>
    <div id="ticketStatus"></div>
    <div id="deleteSection" style="display:none; margin-top:1rem;">
      <button class="btn danger small" id="btnDelete">✕ Διαγραφή εισητηρίου</button>
    </div>
  </div>

  <!-- Upload new ticket -->
  <div class="card">
    <p class="card-title">Ανέβασμα εισητηρίου (PDF)</p>
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">🎫</span>
      <input type="file" id="fileInput" accept=".pdf">
      <p class="drop-text">
        <strong>Κλικ ή drag & drop</strong><br>
        μόνο PDF αρχεία
      </p>
    </div>
    <div class="selected-file" id="selectedFile"></div>

    <div class="field" style="margin-top:1rem;">
      <label>Κωδικός ξεκλειδώματος (ημερομηνία επετείου)</label>
      <input type="text" id="ticketPassword" placeholder="π.χ. 14/02/2022">
    </div>

    <div class="field">
      <label>Μήνυμα καλωσορίσματος</label>
      <textarea id="welcomeMessage" placeholder="Κάτι σε περιμένει..."></textarea>
    </div>

    <button class="btn" id="btnUpload">↑ Ανέβασμα</button>
  </div>

  <!-- Update settings only -->
  <div class="card">
    <p class="card-title">Ενημέρωση ρυθμίσεων (χωρίς νέο αρχείο)</p>
    <div class="field">
      <label>Νέος κωδικός ξεκλειδώματος</label>
      <input type="text" id="newTicketPassword" placeholder="αφήστε κενό για να μην αλλάξει">
    </div>
    <div class="field">
      <label>Νέο μήνυμα καλωσορίσματος</label>
      <textarea id="newWelcomeMessage" placeholder="αφήστε κενό για να μην αλλάξει"></textarea>
    </div>
    <button class="btn small" id="btnUpdateSettings" style="width:auto">Αποθήκευση αλλαγών</button>
  </div>
</div>

<div id="toast"></div>

<script>
let selectedFile = null;

// ── TOAST ──
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

// ── LOGIN ──
async function login() {
  const pw = document.getElementById('adminPassword').value;
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadStatus();
  } else {
    toast(data.message || 'Λάθος κωδικός', 'error');
  }
}

document.getElementById('btnLogin').addEventListener('click', login);
document.getElementById('adminPassword').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// ── LOGOUT ──
document.getElementById('btnLogout').addEventListener('click', async () => {
  await fetch('/api/admin/logout', { method: 'POST' });
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'block';
  document.getElementById('adminPassword').value = '';
});

// ── STATUS ──
async function loadStatus() {
  const res = await fetch('/api/admin/status');
  if (res.status === 401) return;
  const { config } = await res.json();

  const statusDiv = document.getElementById('ticketStatus');
  const deleteSection = document.getElementById('deleteSection');

  if (config.ticketFile) {
    statusDiv.innerHTML = `
      <div class="status-badge active">● Εισητήριο ανεβασμένο</div>
      <p style="font-size:0.75rem; color: var(--muted); margin-top:0.3rem;">
        Αρχείο: <span style="color:var(--cream)">${config.ticketName || 'ticket.pdf'}</span><br>
        Κωδικός: <span style="color:var(--gold)">${config.ticketPassword || '—'}</span>
      </p>`;
    deleteSection.style.display = 'block';
  } else {
    statusDiv.innerHTML = `<div class="status-badge inactive">○ Κανένα εισητήριο</div>`;
    deleteSection.style.display = 'none';
  }
}

// ── FILE INPUT ──
document.getElementById('fileInput').addEventListener('change', e => {
  selectedFile = e.target.files[0];
  document.getElementById('selectedFile').textContent = selectedFile ? '✓ ' + selectedFile.name : '';
});

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') {
    selectedFile = file;
    document.getElementById('selectedFile').textContent = '✓ ' + file.name;
  } else {
    toast('Μόνο PDF αρχεία!', 'error');
  }
});

// ── UPLOAD ──
document.getElementById('btnUpload').addEventListener('click', async () => {
  if (!selectedFile) return toast('Επέλεξε PDF πρώτα!', 'error');
  const pw = document.getElementById('ticketPassword').value.trim();
  if (!pw) return toast('Βάλε κωδικό ξεκλειδώματος!', 'error');

  const formData = new FormData();
  formData.append('ticket', selectedFile);
  formData.append('ticketPassword', pw);
  formData.append('welcomeMessage', document.getElementById('welcomeMessage').value.trim());

  const btn = document.getElementById('btnUpload');
  btn.textContent = '...';

  const res = await fetch('/api/admin/upload', { method: 'POST', body: formData });
  const data = await res.json();
  btn.textContent = '↑ Ανέβασμα';

  if (data.success) {
    toast(data.message, 'success');
    loadStatus();
    selectedFile = null;
    document.getElementById('selectedFile').textContent = '';
    document.getElementById('fileInput').value = '';
  } else {
    toast(data.message, 'error');
  }
});

// ── UPDATE SETTINGS ──
document.getElementById('btnUpdateSettings').addEventListener('click', async () => {
  const res = await fetch('/api/admin/update-settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ticketPassword: document.getElementById('newTicketPassword').value.trim(),
      welcomeMessage: document.getElementById('newWelcomeMessage').value.trim()
    })
  });
  const data = await res.json();
  toast(data.message, data.success ? 'success' : 'error');
  if (data.success) loadStatus();
});

// ── DELETE ──
document.getElementById('btnDelete').addEventListener('click', async () => {
  if (!confirm('Σίγουρα να διαγραφεί το εισητήριο;')) return;
  const res = await fetch('/api/admin/ticket', { method: 'DELETE' });
  const data = await res.json();
  if (data.success) { toast('Διαγράφηκε', 'success'); loadStatus(); }
});

// Check if already logged in
fetch('/api/admin/status').then(r => {
  if (r.ok) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadStatus();
  }
});
</script>
</body>
</html>
